<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invito</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg" />
</audio>

<div class="confetti-layer"></div>

<!-- COVER -->
<section id="cover" class="screen">
  <div class="cover-content">

    <div class="top-decoration">
      <img src="dino.png" class="dino-top" />
    </div>

    <div class="envelope-wrapper">
      <div class="envelope">
        <div class="seal">🦖</div>
      </div>
    </div>

    <button id="openBtn" class="open-btn">Tocca qui per aprire</button>
  </div>
</section>

<!-- INVITO -->
<section id="invite" class="screen hidden">
  <div class="invite-card">
    <div class="invite-inner">

      <h1 id="titolo"></h1>

      <p class="subtitle" id="sottotitolo"></p>

      <div class="main-text">
        <p id="desc1"></p>
        <p class="name-highlight" id="desc2"></p>
      </div>

      <div class="event-date">
        <div class="line"></div>

        <div class="date-center">
          <span class="month" id="mese"></span>
          <span class="day" id="giorno"></span>
          <span class="year" id="anno"></span>
        </div>

        <div class="line"></div>
      </div>

      <div class="event-info">
        <div class="info-box">
          <span id="giornoSettimana"></span>
        </div>

        <div class="info-box">
          <span id="ora"></span>
        </div>
      </div>

      <p class="footer-text" id="testoFinale"></p>

      <div class="actions">

        <a id="btnWhatsapp" class="circle-action" target="_blank">
          <span class="icon">📞</span>
          <span class="action-text">Conferma</span>
        </a>

        <a id="btnMaps" class="circle-action" target="_blank">
          <span class="icon">📍</span>
          <span class="action-text">Mappa</span>
        </a>

      </div>

    </div>
  </div>
</section>

<!-- SCRIPT -->
<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
