          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css" />

</head>

<body>

    <!-- VIDEO INTRO -->

    <video
        id="introVideo"
        class="hidden"
        muted
        playsinline
        preload="auto">

        <source
            id="introSource"
            src=""
            type="video/mp4" />

    </video>

    <!-- ICONA AUDIO -->

    <div
        id="tapAudioHint"
        class="tap-audio-hint hidden">

        🔊

    </div>

    <!-- MUSICA -->

    <audio
        id="bgMusic"
        loop
        preload="auto">

        <source
            id="musicSource"
            src=""
            type="audio/mpeg" />

    </audio>

    <!-- EFFETTI -->

    <div id="effectsRoot"></div>

    <!-- STORYBOOK -->

    <main
        id="storybook"
        class="hidden">

    </main>

    <!-- MODALE -->

    <div
        id="modal"
        class="modal hidden">

        <div
            class="modal-backdrop"
            data-close-modal>

        </div>

        <div class="modal-content">

            <button
                class="modal-close"
                type="button"
                data-close-modal>

                ×

            </button>

            <h2 id="modalTitle"></h2>

            <p id="modalText"></p>

            <img
                id="modalImage"
                class="modal-image hidden"
                alt="">

        </div>

    </div>

    <!-- FLASH -->

    <div
        id="flash"
        class="flash-overlay">

    </div>

    <script src="config.js"></script>

    <script src="script.js"></script>

</body>

</html>
