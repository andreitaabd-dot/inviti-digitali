<!DOCTYPE html>
<html lang="it">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Memoriale Digitale</title>

  <meta name="description" content="Memoriale digitale" />

  <!-- WHATSAPP / FACEBOOK -->
  <meta property="og:title" content="Memoriale Digitale" />
  <meta property="og:description" content="In ricordo" />
  <meta property="og:image" content="preview.jpg?v=1" />
  <meta property="og:url" content="" />
  <meta property="og:type" content="website" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- TWITTER / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Memoriale Digitale" />
  <meta name="twitter:description" content="In ricordo" />
  <meta name="twitter:image" content="preview.jpg?v=1" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <button id="audioOverlay" class="audio-overlay" type="button" aria-label="Attiva audio"></button>

  <main class="memorial-page">

    <section class="memorial-card">

      <!-- FOTO -->
      <div id="fotoWrapper" class="photo-wrapper hidden">
        <img id="fotoPersona" alt="Foto ricordo">
      </div>

      <!-- TITOLO -->
	<p id="titolo" class="small-title"></p>

	<!-- SIMBOLO -->
	<div id="simbolo" class="memorial-symbol hidden"></div>

	<!-- NOME -->
	<h1 id="nome"></h1>

      <!-- DATE VITA -->
      <p id="datePersona" class="life-dates"></p>

      <!-- MESSAGGIO FAMIGLIA -->
      <p id="messaggioFamiglia" class="family-message"></p>

      <!-- FRASE / CITAZIONE -->
      <div id="fraseBox" class="quote-box hidden">
        <p id="frase"></p>
        <span id="autoreFrase"></span>
      </div>

      <!-- CERIMONIA -->
      <section id="cerimoniaBox" class="ceremony-box hidden">

        <h2 id="titoloCerimonia"></h2>

        <div class="ceremony-info">

          <div id="giornoRow" class="info-row hidden">
            <span class="info-icon">🕊️</span>
            <span id="giorno"></span>
          </div>

          <div id="dataRow" class="info-row hidden">
            <span class="info-icon">📅</span>
            <span id="dataCerimonia"></span>
          </div>

          <div id="oraRow" class="info-row hidden">
            <span class="info-icon">🕒</span>
            <span id="ora"></span>
          </div>

          <div id="luogoRow" class="info-row hidden">
            <span class="info-icon">⛪</span>
            <span id="luogo"></span>
          </div>

          <div id="indirizzoRow" class="info-row hidden">
            <span class="info-icon">📍</span>
            <span id="indirizzo"></span>
          </div>

        </div>

      </section>

      <!-- TESTO FINALE -->
      <p id="testoFinale" class="final-text hidden"></p>

      <!-- PULSANTI -->
      <div class="actions">

        <a
          id="btnWhatsapp"
          class="action-btn hidden"
          target="_blank"
          rel="noopener noreferrer">
          Conferma presenza
        </a>

        <a
          id="btnCalendar"
          class="action-btn hidden"
          target="_blank"
          rel="noopener noreferrer">
          Salva in calendario
        </a>

        <a
          id="btnMaps"
          class="action-btn hidden"
          target="_blank"
          rel="noopener noreferrer">
          Come arrivare
        </a>

      </div>

    </section>

  </main>

  <audio id="bgMusic" loop>
    <source src="" type="audio/mpeg">
  </audio>

  <script src="config.js"></script>
  <script src="script.js"></script>

</body>
</html>
